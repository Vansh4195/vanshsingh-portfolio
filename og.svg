<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2ff"/>
      <stop offset="1" stop-color="#a876ff"/>
    </linearGradient>
    <radialGradient id="orb" cx="36%" cy="32%" r="70%">
      <stop offset="0" stop-color="#9bb8ff"/>
      <stop offset="0.55" stop-color="#7aa2ff"/>
      <stop offset="1" stop-color="#5468d4"/>
    </radialGradient>
    <radialGradient id="m1" cx="14%" cy="16%" r="50%">
      <stop offset="0" stop-color="#7aa2ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7aa2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="m2" cx="92%" cy="88%" r="55%">
      <stop offset="0" stop-color="#a876ff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#a876ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#m1)"/>
  <rect width="1200" height="630" fill="url(#m2)"/>

  <!-- signature orb -->
  <g transform="translate(1010,150)">
    <circle r="118" fill="url(#orb)"/>
    <circle r="118" fill="none" stroke="#7aa2ff" stroke-opacity="0.25"/>
    <circle r="96" fill="none" stroke="#7aa2ff" stroke-opacity="0.3"/>

  </text>

  <rect x="80" y="516" width="1040" height="3" rx="2" fill="url(#grad)" opacity="0.7"/>

  <text x="80" y="585" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="27" fill="#f4f4f5">
